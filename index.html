<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✦ Gesture Galaxy — Hologram AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap"
        rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050e;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .title-hud {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-weight: 300;
            letter-spacing: 6px;
            font-size: 15px;
            background: rgba(10, 10, 30, 0.5);
            backdrop-filter: blur(16px);
            padding: 8px 30px;
            border-radius: 60px;
            border: 1px solid rgba(179, 136, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 30px rgba(124, 77, 255, 0.2);
            pointer-events: none;
        }

        .title-hud span {
            color: #b388ff;
            font-weight: 400;
        }

        .camera-frame {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(124, 77, 255, 0.15);
            border: 1px solid rgba(179, 136, 255, 0.15);
            background: #0a0a1a;
        }

        .camera-frame::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(124, 77, 255, 0.2), rgba(255, 79, 216, 0.1), rgba(0, 229, 255, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 5;
        }

        .camera-frame video,
        .camera-frame canvas {
            width: 220px;
            height: 165px;
            display: block;
            transform: scaleX(-1);
        }

        .camera-frame canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #gestureLabel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 14px;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(14px);
            padding: 10px 32px;
            border-radius: 60px;
            border: 1px solid rgba(255, 200, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
            pointer-events: none;
            font-weight: 300;
            max-width: 90vw;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #gestureLabel.active {
            color: #b388ff;
            border-color: rgba(179, 136, 255, 0.3);
            box-shadow: 0 0 40px rgba(179, 136, 255, 0.08);
        }

        .hud-stats {
            position: fixed;
            top: 80px;
            right: 30px;
            z-index: 20;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.25);
            text-align: right;
            line-height: 1.8;
            pointer-events: none;
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hud-stats span {
            color: rgba(179, 136, 255, 0.5);
        }

        @media (max-width: 700px) {

            .camera-frame video,
            .camera-frame canvas {
                width: 150px;
                height: 112px;
            }

            .camera-frame {
                bottom: 16px;
                left: 16px;
                border-radius: 16px;
            }

            .title-hud {
                font-size: 11px;
                padding: 5px 16px;
                top: 12px;
                letter-spacing: 3px;
            }

            #gestureLabel {
                font-size: 10px;
                padding: 6px 16px;
                bottom: 16px;
                white-space: normal;
                max-width: 85vw;
            }

            .hud-stats {
                font-size: 9px;
                top: 60px;
                right: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>

<body>

    <div class="title-hud">✦ <span>GESTURE</span> GALAXY</div>

    <div class="hud-stats" id="hudStats">
        <div>FPS <span id="fpsCounter">60</span></div>
        <div>CONF <span id="confIndicator">--</span></div>
    </div>

    <div class="camera-frame">
        <video class="input_video" autoplay playsinline></video>
        <canvas class="output_canvas"></canvas>
    </div>

    <div id="gestureLabel">✦ arahkan tangan ke kamera</div>

    <div id="three-canvas"></div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop preload="auto">
        <source src="#" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

        // DOM REFS
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gestureLabel = document.getElementById('gestureLabel');
        const fpsSpan = document.getElementById('fpsCounter');
        const confSpan = document.getElementById('confIndicator');

        const W = 220;
        const H = 165;

        // PLAY MUSIK
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.play().catch(() => {
            document.addEventListener('click', () => bgMusic.play(), { once: true });
        });

        // THREE.JS SETUP
        const container = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // POSTPROCESSING
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.3, 0.15, 0.05
        );
        composer.addPass(bloomPass);

        const fxaaPass = new ShaderPass(FXAAShader);
        fxaaPass.uniforms['resolution'].value.set(
            1 / (window.innerWidth * renderer.getPixelRatio()),
            1 / (window.innerHeight * renderer.getPixelRatio())
        );
        composer.addPass(fxaaPass);

        // LIGHTS
        const ambient = new THREE.AmbientLight(0x222244, 0.5);
        scene.add(ambient);

        const light1 = new THREE.PointLight(0x7c4dff, 1.5, 30);
        light1.position.set(5, 5, 10);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xff4fd8, 1.2, 30);
        light2.position.set(-5, -3, 10);
        scene.add(light2);

        const light3 = new THREE.DirectionalLight(0x00e5ff, 0.6);
        light3.position.set(0, 8, 5);
        scene.add(light3);

        // BACKGROUND STARS
        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000;
        const starPos = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            const r = 30 + Math.random() * 100;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.4;
            starPos[i * 3 + 2] = r * Math.cos(phi) - 20;

            const c = new THREE.Color().setHSL(0.7 + Math.random() * 0.2, 0.8, 0.5 + Math.random() * 0.4);
            starColors[i * 3] = c.r;
            starColors[i * 3 + 1] = c.g;
            starColors[i * 3 + 2] = c.b;
            starSizes[i] = 0.1 + Math.random() * 0.5;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

        const starMat = new THREE.PointsMaterial({
            size: 0.25,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // NEBULA
        const cloudGeo = new THREE.BufferGeometry();
        const cloudCount = 1500;
        const cloudPos = new Float32Array(cloudCount * 3);
        const cloudCol = new Float32Array(cloudCount * 3);
        for (let i = 0; i < cloudCount; i++) {
            const r = 6 + Math.random() * 30;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            cloudPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            cloudPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.3;
            cloudPos[i * 3 + 2] = r * Math.cos(phi) - 5;
            const c = new THREE.Color().setHSL(0.7 + Math.random() * 0.15, 0.9, 0.1 + Math.random() * 0.1);
            cloudCol[i * 3] = c.r;
            cloudCol[i * 3 + 1] = c.g;
            cloudCol[i * 3 + 2] = c.b;
        }
        cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPos, 3));
        cloudGeo.setAttribute('color', new THREE.BufferAttribute(cloudCol, 3));
        const cloudMat = new THREE.PointsMaterial({
            size: 1.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.12,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
            depthWrite: false,
        });
        const cloud = new THREE.Points(cloudGeo, cloudMat);
        scene.add(cloud);

        // MAIN GROUP
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        let targetMode = 'idle';
        let gestureCooldown = 0;
        let gestureBuffer = [];
        let lastGesture = null;
        let gestureStable = false;
        let gestureConfidence = 0;

        // ================================================================
        // CREATE CLEAR TEXT WITH SPRITE
        // ================================================================
        function createClearText(text, color1 = '#ff4fd8', color2 = '#7c4dff') {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = 2048;
            canvas.height = 512;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let fontSize = 120;
            if (text.length > 15) fontSize = 90;
            if (text.length > 20) fontSize = 75;
            if (text.length > 25) fontSize = 60;

            ctx.font = `900 ${fontSize}px "Inter", system-ui, -apple-system, sans-serif`;

            ctx.shadowColor = color2;
            ctx.shadowBlur = 60;
            ctx.fillStyle = '#ffffff';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            grad.addColorStop(0, color1);
            grad.addColorStop(0.5, '#ffffff');
            grad.addColorStop(1, color2);
            ctx.shadowBlur = 0;
            ctx.fillStyle = grad;
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            ctx.globalCompositeOperation = 'source-over';

            ctx.shadowBlur = 0;
            ctx.strokeStyle = `rgba(255,255,255,0.15)`;
            ctx.lineWidth = 2;
            ctx.strokeText(text, canvas.width / 2, canvas.height / 2);

            return new THREE.CanvasTexture(canvas);
        }

        // ================================================================
        // LOVE MESSAGE SYSTEM
        // ================================================================
        class LoveMessageSystem {
            constructor() {
                this.messages = [
                    'Untuk Simanis ❤️',
                    'Kamu Cantik Banget',
                    'Semoga Harimu Menyenangkan'
                ];
                this.currentIndex = 0;
                this.timer = 0;
                this.phase = 0;
                this.textSprite = null;
                this.particles = [];
                this.group = new THREE.Group();
                this.isActive = false;
                this.transitionProgress = 0;
                this.isExploding = false;
                this.explodeTimer = 0;
                this.messageDisplayTime = 4.5;
                this.entering = true;
                this.enterProgress = 0;
                this.targetScale = new THREE.Vector3(8, 2, 1);
                this.startScale = new THREE.Vector3(0.1, 0.1, 1);
            }

            start() {
                this.isActive = true;
                this.currentIndex = 0;
                this.phase = 0;
                this.timer = 0;
                this.transitionProgress = 0;
                this.isExploding = false;
                this.entering = true;
                this.enterProgress = 0;
                this.showMessage(this.messages[0]);
                mainGroup.add(this.group);
                gestureLabel.textContent = `✦ 💬 ${this.messages[0]}`;
            }

            showMessage(text) {
                if (this.textSprite) {
                    this.group.remove(this.textSprite);
                    this.textSprite.material.map.dispose();
                    this.textSprite.material.dispose();
                    this.textSprite = null;
                }

                this.particles.forEach(p => {
                    this.group.remove(p);
                    p.geometry.dispose();
                    p.material.dispose();
                });
                this.particles = [];

                const texture = createClearText(text);
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.NormalBlending,
                    depthWrite: false,
                });
                this.textSprite = new THREE.Sprite(material);
                this.textSprite.scale.set(0.1, 0.1, 1);
                this.textSprite.position.z = 0;
                this.group.add(this.textSprite);

                const particleCount = 150;
                for (let i = 0; i < particleCount; i++) {
                    const size = 0.02 + Math.random() * 0.04;
                    const geo = new THREE.SphereGeometry(size, 4, 4);
                    const mat = new THREE.MeshBasicMaterial({
                        color: Math.random() > 0.5 ? 0xff4fd8 : 0x7c4dff,
                        transparent: true,
                        opacity: 0,
                        blending: THREE.AdditiveBlending,
                    });
                    const mesh = new THREE.Mesh(geo, mat);

                    const angle = Math.random() * Math.PI * 2;
                    const radius = 1.5 + Math.random() * 5;
                    mesh.position.set(
                        Math.cos(angle) * radius,
                        (Math.random() - 0.5) * 3.5,
                        (Math.random() - 0.5) * 2
                    );
                    mesh.userData = {
                        angle: angle,
                        radius: radius,
                        speed: 0.2 + Math.random() * 0.5,
                        floatSpeed: 0.3 + Math.random() * 0.5,
                        phase: Math.random() * Math.PI * 2,
                        baseY: (Math.random() - 0.5) * 3.5,
                        startOpacity: 0.2 + Math.random() * 0.3,
                    };
                    this.group.add(mesh);
                    this.particles.push(mesh);
                }

                this.phase = 0;
                this.transitionProgress = 0;
                this.isExploding = false;
                this.entering = true;
                this.enterProgress = 0;
                this.timer = 0;
                gestureLabel.textContent = `✦ 💬 ${text}`;
            }

            update(delta, elapsed) {
                if (!this.isActive || !this.textSprite) return;

                this.timer += delta;

                if (this.phase === 0) {
                    this.enterProgress += delta * 1.0;
                    if (this.enterProgress >= 1) {
                        this.enterProgress = 1;
                        this.phase = 1;
                        this.timer = 0;
                    }

                    const ease = this.enterProgress;
                    const overshoot = 1 + Math.sin(ease * Math.PI) * 0.1;
                    const scale = ease * overshoot;

                    const targetX = this.targetScale.x * scale;
                    const targetY = this.targetScale.y * scale;
                    this.textSprite.scale.set(targetX, targetY, 1);
                    this.textSprite.material.opacity = ease;

                    this.particles.forEach((p, i) => {
                        const data = p.userData;
                        const delay = (i / this.particles.length) * 0.3;
                        const pEase = Math.max(0, Math.min(1, (this.enterProgress - delay) * 2));
                        p.material.opacity = data.startOpacity * pEase;
                    });
                }
                else if (this.phase === 1) {
                    this.textSprite.position.y = Math.sin(elapsed * 0.3) * 0.1;
                    this.textSprite.material.opacity = 1;

                    this.particles.forEach((p) => {
                        const data = p.userData;
                        data.angle += delta * data.speed * 0.5;
                        p.position.x = Math.cos(data.angle) * data.radius;
                        p.position.z = Math.sin(data.angle) * data.radius * 0.5;
                        p.position.y = data.baseY + Math.sin(elapsed * data.floatSpeed + data.phase) * 0.3;

                        const pulse = 0.5 + Math.sin(elapsed * data.speed + data.phase) * 0.5;
                        const s = 0.5 + pulse * 0.5;
                        p.scale.set(s, s, s);
                        p.material.opacity = data.startOpacity * (0.5 + pulse * 0.5);
                    });

                    if (this.timer > this.messageDisplayTime) {
                        this.phase = 2;
                        this.timer = 0;
                        this.isExploding = true;
                        this.explodeTimer = 0;
                    }
                }
                else if (this.phase === 2) {
                    this.explodeTimer += delta;
                    const progress = Math.min(this.explodeTimer / 0.8, 1);

                    const ease = 1 - progress;
                    const scale = ease * ease;
                    this.textSprite.scale.set(
                        this.targetScale.x * scale,
                        this.targetScale.y * scale,
                        1
                    );
                    this.textSprite.material.opacity = ease;

                    this.particles.forEach((p) => {
                        p.position.x += (Math.random() - 0.5) * delta * 3;
                        p.position.y += (Math.random() - 0.5) * delta * 3;
                        p.position.z += (Math.random() - 0.5) * delta * 3;
                        p.material.opacity = p.userData.startOpacity * (1 - progress);
                    });

                    if (progress >= 1) {
                        this.currentIndex = (this.currentIndex + 1) % this.messages.length;
                        this.phase = 0;
                        this.enterProgress = 0;
                        this.timer = 0;
                        this.isExploding = false;
                        this.showMessage(this.messages[this.currentIndex]);
                    }
                }

                this.group.rotation.y += delta * 0.03;
                this.group.rotation.x = Math.sin(elapsed * 0.02) * 0.01;
            }

            stop() {
                this.isActive = false;
                if (this.textSprite) {
                    this.group.remove(this.textSprite);
                    this.textSprite.material.map.dispose();
                    this.textSprite.material.dispose();
                    this.textSprite = null;
                }
                this.particles.forEach(p => {
                    this.group.remove(p);
                    p.geometry.dispose();
                    p.material.dispose();
                });
                this.particles = [];
                mainGroup.remove(this.group);
            }
        }

        let loveSystem = null;

        // ================================================================
        // GALAXY SYSTEM
        // ================================================================
        class GalaxySystem {
            constructor() {
                this.group = new THREE.Group();
                this.isActive = false;
                this.rotationSpeed = 0.005;
                this.targetZoom = 18;
                this.currentZoom = 18;
                this.shootingStars = [];
            }

            start() {
                this.isActive = true;
                this.buildGalaxy();
                mainGroup.add(this.group);
                gestureLabel.textContent = '✦ ✊ Interactive Galaxy';
            }

            buildGalaxy() {
                const count = 25000;
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                const col = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    const arm = Math.floor(Math.random() * 5);
                    const angleOffset = (arm / 5) * Math.PI * 2;
                    const radius = 0.3 + Math.random() * 7;
                    const angle = radius * 1.5 + angleOffset + (Math.random() - 0.5) * 0.8;
                    const spread = 0.05 + Math.random() * 0.5;

                    const x = Math.cos(angle) * radius + (Math.random() - 0.5) * spread;
                    const y = (Math.random() - 0.5) * 1.0;
                    const z = Math.sin(angle) * radius + (Math.random() - 0.5) * spread;

                    pos[i * 3] = x;
                    pos[i * 3 + 1] = y;
                    pos[i * 3 + 2] = z;

                    const hue = 0.65 + Math.random() * 0.25;
                    const c = new THREE.Color().setHSL(hue, 0.8, 0.3 + Math.random() * 0.5);
                    col[i * 3] = c.r;
                    col[i * 3 + 1] = c.g;
                    col[i * 3 + 2] = c.b;
                }

                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

                const mat = new THREE.PointsMaterial({
                    size: 0.06,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.95,
                    blending: THREE.AdditiveBlending,
                    sizeAttenuation: true,
                    depthWrite: false,
                });
                this.particles = new THREE.Points(geo, mat);
                this.group.add(this.particles);

                const holeGeo = new THREE.SphereGeometry(0.6, 32, 32);
                const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                this.blackHole = new THREE.Mesh(holeGeo, holeMat);
                this.group.add(this.blackHole);

                const glowGeo = new THREE.SphereGeometry(1.5, 32, 32);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: 0x7c4dff,
                    transparent: true,
                    opacity: 0.12,
                });
                this.glow = new THREE.Mesh(glowGeo, glowMat);
                this.group.add(this.glow);

                const diskGeo = new THREE.RingGeometry(0.7, 2.2, 64);
                const diskMat = new THREE.MeshBasicMaterial({
                    color: 0x7c4dff,
                    transparent: true,
                    opacity: 0.08,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                });
                this.disk = new THREE.Mesh(diskGeo, diskMat);
                this.disk.rotation.x = Math.PI / 2;
                this.group.add(this.disk);

                for (let i = 0; i < 8; i++) {
                    this.createShootingStar();
                }
            }

            createShootingStar() {
                const geo = new THREE.BufferGeometry();
                const positions = new Float32Array(30 * 3);
                for (let i = 0; i < 30; i++) {
                    positions[i * 3] = (i / 30) * 12 - 6;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const mat = new THREE.LineBasicMaterial({
                    color: 0x00e5ff,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending,
                });
                const star = new THREE.Line(geo, mat);
                star.userData = {
                    speed: 2 + Math.random() * 4,
                    angle: Math.random() * Math.PI * 2,
                    radius: 3 + Math.random() * 6,
                    life: Math.random() * 10,
                    maxLife: 6 + Math.random() * 4,
                };
                this.group.add(star);
                this.shootingStars.push(star);
            }

            setDirection(dx, dy) {
                this.rotationSpeed = -dx * 0.025;
                if (Math.abs(this.rotationSpeed) < 0.001) {
                    this.rotationSpeed = 0.005;
                }
                this.targetZoom = Math.max(10, Math.min(26, 18 - dy * 4));
                this.currentZoom += (this.targetZoom - this.currentZoom) * 0.05;
                camera.position.z = this.currentZoom;
                this.group.rotation.x += dy * 0.008;
                this.group.rotation.x = Math.max(-0.3, Math.min(0.3, this.group.rotation.x));
            }

            update(delta, elapsed) {
                if (!this.isActive) return;

                this.group.rotation.y += this.rotationSpeed;

                if (this.glow) {
                    this.glow.scale.setScalar(1 + Math.sin(elapsed * 0.5) * 0.1);
                }
                if (this.disk) {
                    this.disk.rotation.z += delta * 0.5;
                }

                for (const star of this.shootingStars) {
                    star.userData.life += delta;
                    if (star.userData.life > star.userData.maxLife) {
                        star.userData.life = 0;
                        star.userData.angle = Math.random() * Math.PI * 2;
                        star.userData.radius = 3 + Math.random() * 6;
                    }
                    const progress = star.userData.life / star.userData.maxLife;
                    const angle = star.userData.angle + progress * 4;
                    const radius = star.userData.radius + progress * 3;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = (Math.random() - 0.5) * 2;
                    star.position.set(x, y, z);

                    const pos = star.geometry.attributes.position.array;
                    for (let i = 0; i < 30; i++) {
                        const t = i / 30;
                        pos[i * 3] = -t * 6;
                        pos[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
                        pos[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    }
                    star.geometry.attributes.position.needsUpdate = true;
                    star.material.opacity = 0.6 * (1 - progress * 0.8);
                }
            }

            stop() {
                this.isActive = false;
                while (this.group.children.length) {
                    const child = this.group.children[0];
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                    this.group.remove(child);
                }
                mainGroup.remove(this.group);
                camera.position.z = 18;
            }
        }

                    const layerRadius = 0.5 + layer * 0.35;
                    const layerHeight = layer * 0.2;

                    for (let i = 0; i < petalsPerLayer; i++) {
                        const angle = (i / petalsPerLayer) * Math.PI * 2 + layer * 0.3;
                        const petalGeo = new THREE.SphereGeometry(0.06 + layer * 0.015, 8, 8);
                        const petalMat = new THREE.MeshBasicMaterial({

                            opacity: 0.5 + Math.random() * 0.4,
                            blending: THREE.AdditiveBlending,
                        });
                        const petal = new THREE.Mesh(petalGeo, petalMat);
                        const r = layerRadius + Math.sin(angle * 4) * 0.15;
                        petal.position.set(
                            Math.cos(angle) * r,
                            layerHeight + Math.sin(angle * 3) * 0.08,
                            Math.sin(angle) * r
                        );
                        petal.scale.set(

                            0.4 + Math.cos(angle * 4) * 0.3,
                            0.8 + Math.cos(angle * 3) * 0.3
                        );
                        petal.userData = {
                            layer: layer,
                            angle: angle,
                            targetScale: 0.5 + Math.random() * 0.8,
                        };
                        this.group.add(petal);
                        this.petals.push(petal);
                    }
                }

                const stemGeo = new THREE.CylinderGeometry(0.04, 0.06, 2.5);
                const stemMat = new THREE.MeshBasicMaterial({ color: 0x1d4a1a });
                const stem = new THREE.Mesh(stemGeo, stemMat);
                stem.position.y = -1.5;
                this.group.add(stem);

                for (let i = 0; i < 4; i++) {
                    const leafGeo = new THREE.SphereGeometry(0.08, 6, 6);
                    const leafMat = new THREE.MeshBasicMaterial({
                        color: 0x2d6a27,
                        transparent: true,
                        opacity: 0.8,
                    });
                    const leaf = new THREE.Mesh(leafGeo, leafMat);
                    leaf.position.set(
                        (Math.random() - 0.5) * 0.5,
                        -0.8 - i * 0.4,
                        (Math.random() - 0.5) * 0.5
                    );
                    leaf.scale.set(0.4 + Math.random() * 0.2, 0.08, 0.4 + Math.random() * 0.2);
                    this.group.add(leaf);
                }

                for (let i = 0; i < 80; i++) {
                    const sparkle = new THREE.SphereGeometry(0.015, 6, 6);
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0xff4fd8,
                        transparent: true,
                        opacity: 0.3 + Math.random() * 0.4,
                        blending: THREE.AdditiveBlending,
                    });
                    const mesh = new THREE.Mesh(sparkle, mat);
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 0.5 + Math.random() * 2.5;
                    mesh.position.set(
                        Math.cos(angle) * radius,
                        Math.random() * 3 - 0.5,
                        Math.sin(angle) * radius
                    );
                    mesh.userData = {
                        angle: angle,
                        radius: radius,
                        speed: 0.5 + Math.random() * 1.5,
                        phase: Math.random() * Math.PI * 2,
                        floatSpeed: 0.2 + Math.random() * 0.5,
                    };
                    this.group.add(mesh);
                    this.petals.push(mesh);

            update(delta, elapsed) {
                if (!this.isActive) return;

                this.progress += delta * 0.25;
                if (this.progress > 1) this.progress = 1;

                this.group.rotation.y += delta * 0.2;

                this.petals.forEach((petal, i) => {
                    if (i < 140) {
                        const open = Math.min(this.progress * 1.8, 1);
                        const scale = 0.3 + open * 0.7;
                        petal.scale.x = scale * (1 + Math.sin(elapsed * 0.3 + i) * 0.1);
                        petal.scale.z = scale * (1 + Math.cos(elapsed * 0.3 + i) * 0.1);
                        petal.scale.y = scale * (0.5 + Math.sin(elapsed * 0.2 + i * 0.5) * 0.2);
                    }
                });

                this.petals.forEach((sparkle, i) => {
                    if (i >= 140) {
                        const data = sparkle.userData;
                        if (data) {
                            data.angle += delta * data.speed * 0.3;
                            sparkle.position.x = Math.cos(data.angle) * data.radius;
                            sparkle.position.z = Math.sin(data.angle) * data.radius;
                            sparkle.position.y += Math.sin(elapsed * data.floatSpeed + data.phase) * delta * 0.15;
                            sparkle.material.opacity = 0.3 + Math.sin(elapsed * data.speed + data.phase) * 0.3;
                            const s = 0.5 + Math.sin(elapsed * data.speed + data.phase) * 0.5;
                            sparkle.scale.set(s, s, s);
                        }
                    }
                });

            stop() {
                this.isActive = false;
                while (this.group.children.length) {
                    const child = this.group.children[0];
                    child.geometry.dispose();
                    child.material.dispose();
                    this.group.remove(child);
                }

            buildHeart() {

                const pos = new Float32Array(count * 3);
                const col = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    const t = Math.random() * Math.PI * 2;
                    const r = 0.3 + Math.random() * 2.5;
                    const x = 2.5 * Math.pow(Math.sin(t), 3) * r * 0.5;
                    const y = (1.8 * Math.cos(t) - 0.8 * Math.cos(2 * t) - 0.4 * Math.cos(3 * t) - 0.1 * Math.cos(4 * t)) * r *
                        0.5;
                    const z = (Math.random() - 0.5) * 1.5;

                    pos[i * 3] = x;
                    pos[i * 3 + 1] = y;
                    pos[i * 3 + 2] = z;

                    const hue = 0.9 + Math.random() * 0.08;
                    const c = new THREE.Color().setHSL(hue, 1, 0.5 + Math.random() * 0.4);
                    col[i * 3] = c.r;
                    col[i * 3 + 1] = c.g;
                    col[i * 3 + 2] = c.b;
                }

                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

                const mat = new THREE.PointsMaterial({
                    size: 0.08,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.95,
                    blending: THREE.AdditiveBlending,
                    sizeAttenuation: true,
                    depthWrite: false,
                });
                this.heartMesh = new THREE.Points(geo, mat);
                this.group.add(this.heartMesh);

                for (let i = 0; i < 50; i++) {
                    const hGeo = new THREE.SphereGeometry(0.03, 6, 6);
                    const hMat = new THREE.MeshBasicMaterial({
                        color: 0xff4fd8,
                        transparent: true,
                        opacity: 0.4 + Math.random() * 0.4,
                        blending: THREE.AdditiveBlending,
                    });
                    const h = new THREE.Mesh(hGeo, hMat);
                    h.position.set(
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 6,
                        (Math.random() - 0.5) * 4
                    );
                    h.userData = {
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: 0.3 + Math.random() * 0.8,
                        vz: (Math.random() - 0.5) * 0.5,
                        phase: Math.random() * Math.PI * 2,
                        baseScale: 0.5 + Math.random() * 0.5,
                    };
                    this.group.add(h);
                    this.particles.push(h);
                }
            }

            update(delta, elapsed) {
                if (!this.isActive) return;

                this.beatPhase += delta * 2.5;
                const beat = Math.abs(Math.sin(this.beatPhase));
                const scale = 1 + beat * 0.2;

                if (this.heartMesh) {
                    this.heartMesh.scale.set(scale, scale, scale);
                }

                this.group.rotation.y += delta * 0.15;

                this.particles.forEach((h) => {
                    const data = h.userData;
                    h.position.x += data.vx * delta;
                    h.position.y += data.vy * delta + Math.sin(elapsed * 0.5 + data.phase) * 0.008;
                    h.position.z += data.vz * delta;

                    if (h.position.y > 4) {
                        h.position.y = -4;
                        h.position.x = (Math.random() - 0.5) * 8;
                        h.position.z = (Math.random() - 0.5) * 4;
                    }
                    if (Math.abs(h.position.x) > 5) h.position.x *= -0.5;
                    if (Math.abs(h.position.z) > 3) h.position.z *= -0.5;

                    const pulse = 0.5 + Math.sin(elapsed * 0.5 + data.phase) * 0.3;
                    h.material.opacity = 0.3 + pulse * 0.5;
                    const s = data.baseScale * (0.5 + Math.sin(elapsed * 0.3 + data.phase) * 0.5);
                    h.scale.set(s, s, s);
                });
            }

            stop() {
                this.isActive = false;
                while (this.group.children.length) {
                    const child = this.group.children[0];
                    child.geometry.dispose();
                    child.material.dispose();
                    this.group.remove(child);
                }
                mainGroup.remove(this.group);
            }
        }

class GallerySystem {
    constructor() {
        this.group = new THREE.Group();
        this.isActive = false;
        this.photos = [];
        this.currentIndex = 0;
        this.timer = 0;
        this.textures = [];
        this.imageUrls = [
            'satu.jpeg',
            'dua.jpeg', 
            'tiga.jpeg',
            'empat.jpeg'
        ];
        this.imageLabels = ['📸 Foto 1', '📸 Foto 2', '📸 Foto 3', '📸 Foto 4'];
        this.loadedCount = 0;
        this.allLoaded = false;
        this.totalImages = this.imageUrls.length;
        this.isLoading = false;
        this.loadAttempts = {};
    }

    start() {
        if (this.isLoading) return;
        this.isLoading = true;
        this.isActive = true;
        this.currentIndex = 0;
        this.timer = 0;
        this.textures = [];
        this.loadedCount = 0;
        this.allLoaded = false;
        this.loadAttempts = {};

        console.log('📸 Gallery System started...');
        gestureLabel.textContent = '✦ 🖼️ Loading Gallery...';
        this.loadImages();
    }

    loadImages() {
        if (this.imageUrls.length === 0) {
            console.warn('No images to load, using fallback');
            this.createFallbackGallery();
            return;
        }

        this.imageUrls.forEach((url, index) => {
            // Buat texture kosong dulu
            const placeholderCanvas = document.createElement('canvas');
            placeholderCanvas.width = 512;
            placeholderCanvas.height = 384;
            const pCtx = placeholderCanvas.getContext('2d');
            
            // Loading placeholder
            const grad = pCtx.createRadialGradient(256, 192, 30, 256, 192, 250);
            grad.addColorStop(0, '#2a1a4e');
            grad.addColorStop(0.5, '#1a0a2e');
            grad.addColorStop(1, '#05050e');
            pCtx.fillStyle = grad;
            pCtx.fillRect(0, 0, 512, 384);
            
            pCtx.fillStyle = 'rgba(255,255,255,0.3)';
            pCtx.font = '24px Inter';
            pCtx.textAlign = 'center';
            pCtx.textBaseline = 'middle';
            pCtx.fillText(`📸 Loading ${index + 1}/${this.totalImages}...`, 256, 192);
            
            const texture = new THREE.CanvasTexture(placeholderCanvas);
            this.textures[index] = texture;
            
            // LOAD GAMBAR DENGAN CARA YANG LEBIH RELIABLE
            this.loadImageWithXHR(url, index);
        });
    }

    loadImageWithXHR(url, index) {
        console.log(`🔄 Loading: ${url} with XHR`);
        
        // Gunakan fetch atau XMLHttpRequest untuk lebih reliable
        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.blob();
            })
            .then(blob => {
                const img = new Image();
                img.onload = () => {
                    console.log(`✅ Loaded: ${url}`);
                    this.processLoadedImage(img, index);
                };
                img.onerror = (e) => {
                    console.warn(`❌ Failed to decode: ${url}`, e);
                    this.tryAlternativeLoad(url, index);
                };
                img.src = URL.createObjectURL(blob);
            })
            .catch(error => {
                console.warn(`❌ Fetch failed: ${url}`, error);
                this.tryAlternativeLoad(url, index);
            });
    }

    tryAlternativeLoad(url, index) {
        // Coba dengan Image langsung
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = () => {
            console.log(`✅ Loaded (alternative): ${url}`);
            this.processLoadedImage(img, index);
        };
        
        img.onerror = () => {
            console.warn(`❌ All methods failed for: ${url}`);
            // Coba dengan path absolut dari root
            const altUrl = '/' + url;
            img.src = altUrl;
            
            // Jika masih gagal, gunakan fallback
            setTimeout(() => {
                if (!img.complete || img.naturalWidth === 0) {
                    console.warn(`⏱️ Timeout for: ${url}, using fallback`);
                    this.useFallbackForIndex(index);
                }
            }, 2000);
        };
        
        img.src = url;
        
        // Timeout
        setTimeout(() => {
            if (!img.complete || img.naturalWidth === 0) {
                console.warn(`⏱️ Timeout alternative for: ${url}`);
                this.useFallbackForIndex(index);
            }
        }, 3000);
    }

    processLoadedImage(img, index) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 384;
        const ctx = canvas.getContext('2d');
        
        // Background
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, 512, 384);
        
        // Draw image dengan aspect ratio
        const aspect = img.width / img.height;
        let dw, dh, dx, dy;
        
        if (aspect > 1) {
            dw = 440;
            dh = 440 / aspect;
            dx = 36;
            dy = (344 - dh) / 2 + 20;
        } else {
            dh = 344;
            dw = 344 * aspect;
            dx = (472 - dw) / 2 + 20;
            dy = 20;
        }
        
        // Clip rounded rectangle
        ctx.save();
        ctx.beginPath();
        const radius = 6;
        const x = dx, y = dy, w = dw, h = dh;
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + w - radius, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
        ctx.lineTo(x + w, y + h - radius);
        ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        ctx.lineTo(x + radius, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, dx, dy, dw, dh);
        ctx.restore();
        
        // Border
        ctx.shadowColor = '#7c4dff';
        ctx.shadowBlur = 30;
        ctx.strokeStyle = 'rgba(124,77,255,0.4)';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, 472, 344);
        ctx.shadowBlur = 0;
        
        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '14px Inter';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText(`✦ ${this.imageLabels[index] || `Photo ${index + 1}`}`, 480, 372);
        
        // Update texture
        const newTexture = new THREE.CanvasTexture(canvas);
        this.textures[index] = newTexture;
        this.checkLoaded();
    }

    useFallbackForIndex(index) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 384;
        const ctx = canvas.getContext('2d');
        
        const colors = ['#7c4dff', '#ff4fd8', '#00e5ff', '#ffd740'];
        const emojis = ['🌅', '🌸', '🌊', '⭐'];
        const titles = ['Sunset', 'Flower', 'Ocean', 'Star'];
        
        const grad = ctx.createRadialGradient(256, 192, 30, 256, 192, 250);
        grad.addColorStop(0, colors[index % colors.length]);
        grad.addColorStop(0.5, '#1a0a2e');
        grad.addColorStop(1, '#05050e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 384);
        
        ctx.shadowColor = colors[index % colors.length];
        ctx.shadowBlur = 60;
        ctx.fillStyle = '#ffffff';
        ctx.font = '80px Inter';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emojis[index % emojis.length], 256, 170);
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '20px Inter';
        ctx.fillText(titles[index % titles.length], 256, 230);
        
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Inter';
        ctx.fillText('✨ Gesture Gallery', 256, 260);
        
        ctx.shadowColor = colors[index % colors.length];
        ctx.shadowBlur = 30;
        ctx.strokeStyle = colors[index % colors.length];
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, 472, 344);
        ctx.shadowBlur = 0;
        
        const texture = new THREE.CanvasTexture(canvas);
        this.textures[index] = texture;
        this.checkLoaded();
    }

    checkLoaded() {
        this.loadedCount++;
        console.log(`📸 Loaded ${this.loadedCount}/${this.totalImages}`);
        
        if (this.loadedCount >= this.totalImages) {
            this.allLoaded = true;
            setTimeout(() => {
                this.buildGallery();
                mainGroup.add(this.group);
                gestureLabel.textContent = '✦ 🖼️ Memory Gallery';
                console.log('✅ Gallery ready!');
            }, 500);
        }
    }

    createFallbackGallery() {
        const total = 4;
        for (let i = 0; i < total; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 384;
            const ctx = canvas.getContext('2d');
            this.drawFallbackImage(ctx, i);
            const texture = new THREE.CanvasTexture(canvas);
            this.textures.push(texture);
        }
        this.allLoaded = true;
        this.buildGallery();
        mainGroup.add(this.group);
        gestureLabel.textContent = '✦ 🖼️ Memory Gallery';
        console.log('✅ Fallback gallery ready!');
    }

    drawFallbackImage(ctx, index) {
        const colors = ['#7c4dff', '#ff4fd8', '#00e5ff', '#ffd740'];
        const emojis = ['🌅', '🌸', '🌊', '⭐'];
        const titles = ['Sunset', 'Flower', 'Ocean', 'Star'];
        
        const grad = ctx.createRadialGradient(256, 192, 30, 256, 192, 250);
        grad.addColorStop(0, colors[index % colors.length]);
        grad.addColorStop(0.5, '#1a0a2e');
        grad.addColorStop(1, '#05050e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 384);
        
        ctx.shadowColor = colors[index % colors.length];
        ctx.shadowBlur = 60;
        ctx.fillStyle = '#ffffff';
        ctx.font = '80px Inter';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emojis[index % emojis.length], 256, 170);
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '20px Inter';
        ctx.fillText(titles[index % titles.length], 256, 230);
        
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '12px Inter';
        ctx.fillText('✨ Gesture Gallery', 256, 260);
        
        ctx.shadowColor = colors[index % colors.length];
        ctx.shadowBlur = 30;
        ctx.strokeStyle = colors[index % colors.length];
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, 472, 344);
        ctx.shadowBlur = 0;
    }

    buildGallery() {
        if (this.textures.length === 0) {
            console.warn('No textures to build gallery');
            return;
        }
        
        while (this.group.children.length) {
            const child = this.group.children[0];
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
            this.group.remove(child);
        }
        this.photos = [];
        
        const spacing = 3.8;
        const totalPhotos = this.textures.length;
        
        this.textures.forEach((texture, index) => {
            const group = new THREE.Group();
            
            // Frame
            const frameGeo = new THREE.BoxGeometry(3.0, 2.2, 0.12);
            const frameMat = new THREE.MeshBasicMaterial({
                color: 0x7c4dff,
                transparent: true,
                opacity: 0.06,
                wireframe: true,
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            group.add(frame);
            
            // Border
            const borderGeo = new THREE.EdgesGeometry(frameGeo);
            const borderMat = new THREE.LineBasicMaterial({
                color: 0x7c4dff,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
            });
            const border = new THREE.LineSegments(borderGeo, borderMat);
            group.add(border);
            
            // Photo
            const photoMat = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0.95,
                side: THREE.DoubleSide,
            });
            const photoGeo = new THREE.PlaneGeometry(2.6, 1.8);
            const photo = new THREE.Mesh(photoGeo, photoMat);
            photo.position.z = 0.06;
            group.add(photo);
            
            // Position
            const angle = (index / totalPhotos) * Math.PI * 2;
            group.position.set(
                Math.sin(angle) * spacing,
                0,
                Math.cos(angle) * spacing
            );
            group.rotation.y = -angle;
            group.userData = {
                index: index,
                angle: angle,
            };
            
            this.group.add(group);
            this.photos.push(group);
        });
        
        // Glow
        const glowGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x7c4dff,
            transparent: true,
            opacity: 0.1,
            blending: THREE.AdditiveBlending,
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        this.group.add(glow);
        
        console.log(`✅ Gallery built with ${totalPhotos} photos`);
    }

    update(delta, elapsed) {
        if (!this.isActive || this.photos.length === 0) return;
        
        this.timer += delta;
        this.group.rotation.y += delta * 0.12;
        
        this.photos.forEach((photo, i) => {
            const offset = (i - this.currentIndex + this.photos.length) % this.photos.length;
            const distance = Math.min(Math.abs(offset), this.photos.length - Math.abs(offset));
            
            const floatY = Math.sin(elapsed * 0.4 + i * 0.8) * 0.2;
            photo.position.y = floatY;
            
            const scale = offset === 0 ? 1 : 0.7 + (1 - distance / (this.photos.length / 2)) * 0.3;
            photo.scale.set(scale, scale, scale);
            
            const opacity = 1 - (distance / (this.photos.length / 2)) * 0.4;
            photo.children.forEach(child => {
                if (child.material && child.material.opacity !== undefined) {
                    if (child.type === 'LineSegments') {
                        child.material.opacity = opacity * 0.15;
                    } else if (child.type === 'Mesh' && child.geometry.type === 'BoxGeometry') {
                        child.material.opacity = opacity * 0.06;
                    }
                }
            });
            
            if (offset === 0) {
                const pulse = 0.8 + Math.sin(elapsed * 1.5) * 0.2;
                photo.children.forEach(child => {
                    if (child.type === 'LineSegments') {
                        child.material.opacity = 0.15 * pulse;
                    }
                });
            }
        });
        
        if (this.timer > 3.5) {
            this.timer = 0;
            this.currentIndex = (this.currentIndex + 1) % this.photos.length;
        }
    }

    stop() {
        this.isActive = false;
        this.isLoading = false;
        while (this.group.children.length) {
            const child = this.group.children[0];
            if (child.geometry) child.geometry.dispose();
            if (child.material) {
                if (child.material.map) child.material.map.dispose();
                child.material.dispose();
            }
            this.group.remove(child);
        }
        mainGroup.remove(this.group);
        this.photos = [];
    }
}

        let gallerySystem = null;

        // ================================================================
        // GESTURE ENGINE
        // ================================================================
        function isFingerUp(landmarks, tip, pip) {
            return landmarks[tip].y < landmarks[pip].y;
        }

        function detectGesture(landmarks) {
            const thumb = landmarks[4].x < landmarks[3].x;
            const index = isFingerUp(landmarks, 8, 6);
            const middle = isFingerUp(landmarks, 12, 10);
            const ring = isFingerUp(landmarks, 16, 14);
            const pinky = isFingerUp(landmarks, 20, 18);

            if (thumb && index && middle && ring && pinky) return 'wave';
            if (!index && !middle && !ring && !pinky) return 'fist';
            if (index && !middle && !ring && !pinky) return 'one';
            if (index && middle && !ring && !pinky) return 'two';
            if (index && middle && ring && !pinky) return 'three';
            if (index && middle && ring && pinky && !thumb) return 'four';

            return null;
        }

        function processGesture(landmarks) {
            const gesture = detectGesture(landmarks);
            if (!gesture) {
                gestureBuffer = [];
                gestureStable = false;
                gestureConfidence = 0;
                confSpan.textContent = '--';
                return null;
            }

            gestureBuffer.push(gesture);
            if (gestureBuffer.length > 8) gestureBuffer.shift();

            const last = gestureBuffer[gestureBuffer.length - 1];
            const count = gestureBuffer.filter(g => g === last).length;
            gestureConfidence = count / gestureBuffer.length;
            confSpan.textContent = Math.round(gestureConfidence * 100) + '%';

            if (count >= 6 && gestureConfidence > 0.6) {
                if (last !== lastGesture || gestureStable === false) {
                    lastGesture = last;
                    gestureStable = true;
                    return last;
                }
                return last;
            }
            return null;
        }

        // ================================================================
        // MODE TRIGGER
        // ================================================================
        function triggerMode(mode) {
            if (gestureCooldown > 0) return;
            if (mode === targetMode && targetMode !== 'idle') return;

            if (loveSystem) {
                loveSystem.stop();
                loveSystem = null;
            }
            if (galaxySystem) {
                galaxySystem.stop();
                galaxySystem = null;
            }
            if (roseSystem) {
                roseSystem.stop();
                roseSystem = null;
            }
            if (heartSystem) {
                heartSystem.stop();
                heartSystem = null;
            }
            if (starSystem) {
                starSystem.stop();
                starSystem = null;
            }
            if (gallerySystem) {
                gallerySystem.stop();
                gallerySystem = null;
            }

            while (mainGroup.children.length) {
                const child = mainGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
                mainGroup.remove(child);
            }

            targetMode = mode;
            gestureCooldown = 2.0;

            const modeMap = {
                'wave': { system: LoveMessageSystem, label: '🖐️ Love Message' },
                'fist': { system: GalaxySystem, label: '✊ Interactive Galaxy' },
                'one': { system: RoseSystem, label: '☝️ Magic Rose' },
                'two': { system: HeartSystem, label: '❤️ Heart Universe' },
                'three': { system: StarSystem, label: '🤟 Cosmic Star' },
                'four': { system: GallerySystem, label: '🖼️ Memory Gallery' },
            };

            const config = modeMap[mode];
            if (config) {
                const SystemClass = config.system;
                const system = new SystemClass();
                if (mode === 'wave') loveSystem = system;
                else if (mode === 'fist') galaxySystem = system;
                else if (mode === 'one') roseSystem = system;
                else if (mode === 'two') heartSystem = system;
                else if (mode === 'three') starSystem = system;
                else if (mode === 'four') gallerySystem = system;
                system.start();
                gestureLabel.textContent = `✦ ${config.label}`;
            } else {
                gestureLabel.textContent = '✦ arahkan tangan ke kamera';
            }

            gestureLabel.classList.add('active');
        }

        // ================================================================
        // MEDIAPIPE HANDS
        // ================================================================
        function onResults(results) {
            canvasElement.width = W;
            canvasElement.height = H;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, W, H);
            canvasCtx.drawImage(results.image, 0, 0, W, H);

            let detected = null;
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    for (const lm of landmarks) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(lm.x * W, lm.y * H, 3, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#b388ff';
                        canvasCtx.shadowColor = '#7c4dff';
                        canvasCtx.shadowBlur = 12;
                        canvasCtx.fill();
                    }
                    canvasCtx.shadowBlur = 0;
                    canvasCtx.strokeStyle = 'rgba(179, 136, 255, 0.2)';
                    canvasCtx.lineWidth = 1.5;
                    const connections = [
                        [0, 1],
                        [1, 2],
                        [2, 3],
                        [3, 4],
                        [0, 5],
                        [5, 6],
                        [6, 7],
                        [7, 8],
                        [5, 9],
                        [9, 10],
                        [10, 11],
                        [11, 12],
                        [9, 13],
                        [13, 14],
                        [14, 15],
                        [15, 16],
                        [13, 17],
                        [17, 18],
                        [18, 19],
                        [19, 20],
                        [0, 17]
                    ];
                    for (const [i, j] of connections) {
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(landmarks[i].x * W, landmarks[i].y * H);
                        canvasCtx.lineTo(landmarks[j].x * W, landmarks[j].y * H);
                        canvasCtx.stroke();
                    }

                    if (targetMode === 'fist' && galaxySystem && galaxySystem.isActive) {
                        const wrist = landmarks[0];
                        const centerX = wrist.x - 0.5;
                        const centerY = wrist.y - 0.5;
                        galaxySystem.setDirection(centerX * 4, centerY * 4);
                    }

                    const gesture = processGesture(landmarks);
                    if (gesture) {
                        detected = gesture;
                    }
                }
            }

            if (detected) {
                triggerMode(detected);
            }

            canvasCtx.restore();
        }

        // ================================================================
        // INIT MEDIAPIPE
        // ================================================================
        const hands = new Hands({
            locateFile: (file) =>
                `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6,
        });

        hands.onResults(onResults);

        const cameraDevice = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: W,
            height: H,
        });
        cameraDevice.start();

        // ================================================================
        // ANIMATION LOOP
        // ================================================================
        let clock = new THREE.Clock();
        let frameCount = 0;
        let fpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            frameCount++;
            fpsTime += delta;
            if (fpsTime >= 1) {
                fpsSpan.textContent = frameCount;
                frameCount = 0;
                fpsTime = 0;
            }

            if (gestureCooldown > 0) {
                gestureCooldown -= delta;
            }

            stars.rotation.y += delta * 0.008;
            cloud.rotation.y += delta * 0.005;

            if (loveSystem && loveSystem.isActive) loveSystem.update(delta, elapsed);
            if (galaxySystem && galaxySystem.isActive) galaxySystem.update(delta, elapsed);
            if (roseSystem && roseSystem.isActive) roseSystem.update(delta, elapsed);
            if (heartSystem && heartSystem.isActive) heartSystem.update(delta, elapsed);
            if (starSystem && starSystem.isActive) starSystem.update(delta, elapsed);
            if (gallerySystem && gallerySystem.isActive) gallerySystem.update(delta, elapsed);

            camera.position.x = Math.sin(elapsed * 0.02) * 0.5;
            camera.position.y = Math.sin(elapsed * 0.03) * 0.3;
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        animate();

        // ================================================================
        // RESIZE
        // ================================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            fxaaPass.uniforms['resolution'].value.set(
                1 / (w * renderer.getPixelRatio()),
                1 / (h * renderer.getPixelRatio())
            );
        });

        // Auto-start gallery immediately if image files are available
        gallerySystem = new GallerySystem();
        gallerySystem.start();
        gestureLabel.textContent = '✦ 🖼️ Memory Gallery';

        console.log('✨ Gesture Galaxy Hologram v5.0 siap!');
        console.log('📸 Mencoba load: satu.jpeg');
        console.log('🖐️ Tunjukkan 4 jari untuk membuka Gallery');
    </script>
